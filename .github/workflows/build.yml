name: Build & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ImageMagickUI/ImageMagickUI.csproj

      - name: Build (Release)
        run: dotnet build ImageMagickUI/ImageMagickUI.csproj -c Release --no-restore

      - name: Publish
        run: >
          dotnet publish ImageMagickUI/ImageMagickUI.csproj
          -c Release
          --no-restore
          -o publish/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageMagickUI
          path: publish/ImageMagickUI.exe
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ImageMagickUI

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ImageMagickUI.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
